spring:
  application:
    name: module03-entity-mapping
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/menudb
    username: wanted
    password: wanted
  jpa:
    show-sql: true
    database: mysql
    hibernate:
      ddl-auto: update
      # create : 실행 시 테이블 drop 후 새로 생성한다. (주의! 기존 데이터 삭제 됨.)
      # create-drop : 시작 시 생성, 종료 시 삭제 -> 테스트 환경에서 활용
      # update : 변경 된 엔티티만 반영 -> 개발환경에서 사용
      # none : 아무 작업도 하지 않는다. -> ERD 읽혀둔 것으로 진행할 때 (DB 스키마 직접 관리)
      # update 를 가장 많이 사용. / ERD 설계를 완벽하게 했다면 none 사용
    properties:
      hibernate:
        format_sql: true


# 기존에 persistence.xml 에서 했던 작업과 동일.
